# CAM: CAD-модель → G-Code — пример конфигурации
# Скопируйте в config.yaml и подставьте свои значения:
#   cp config.example.yaml config.yaml
#   python run_cam.py деталь.step --config config.yaml
# Полное описание параметров: README_CAM.md

# ── Инструмент и режимы резания (задать под свой станок/материал) ────────────────
TOOL_DIAMETER: 6.0     # мм — фреза, которая реально стоит в шпинделе
FEED_RATE: 800         # мм/мин — подача под ваш материал
SPINDLE_SPEED: 12000   # об/мин
SAFE_HEIGHT: 10.0      # мм — высота холостых перемещений над заготовкой

# ── Заготовка (габарит детали + поля; из файла не загружается) ───────────────────
# Размеры заготовки печатаются в лог и в шапку G-Code комментарием.
# Дефолт = 2 диаметра фрезы: контур выбирается адаптивно. Меньше — контур одним
# проходом вокруг силуэта; 0 = заготовка точно по габариту детали.
STOCK_MARGIN: 12.0     # мм — поля вокруг детали по X и Y
STOCK_MARGIN_TOP: 0.0  # мм — запас материала над деталью (Z+)
# Произвольная заготовка из файла (отливка/поковка): та же система координат,
# что у модели (экспорт из одной сборки NX); STOCK_MARGIN игнорируется.
STOCK_FILE: ""         # путь к .step/.iges/.brep/.stl/.prt; "" = бокс от габарита
# Выравнивание заготовки из файла ПО ДЕТАЛИ (флаг --stock-align): координаты файла
# игнорируются — заготовка кладётся плашмя и ставится «уголок в уголке»: X край
# в край, Y центр в центр, Z дно в дно (запас сверху). Нужно, когда один файл
# заготовки используется для нескольких деталей серии.
STOCK_ALIGN: false

# ── Безопасность ─────────────────────────────────────────────────────────────────
# Зазор от стола: фреза не опускается ниже «дно детали + зазор» НИ в одной операции
# (деталь лежит на столе). Сквозные вырезы/контур оставляют плёнку этой толщины.
FLOOR_CLEARANCE: 0.5   # мм; 0 = резать до самого дна
# Мёртвые зоны (XY-боксы в координатах программы) — фреза туда не заходит:
# DEAD_ZONES: [{x: [10, 30], y: [0, 15]}]
DEAD_ZONES: []

# ── Черновая: по этапам, как у технолога ─────────────────────────────────────────
# Порядок (stages): вырезы → грани сверху вниз → внешний контур детали ПОСЛЕДНИМ
# (деталь до конца держится в заготовке; лишний материал в углах заготовки,
# не касающийся детали, остаётся). Зоны не пересекаются.
# ROUGH_MODE: "stages" (дефолт) | "layers" — ЭКСПЕРИМЕНТ: послойно, как Cavity
# Mill в NX (сечение заготовки − тень детали, диапазонами между уровнями).
ROUGH_MODE: "stages" 
ROUGH_ALLOWANCE: 0.5   # мм — величина припуска (шаг 0.1); 0 = черновая выключена
# Где оставлять припуск: none = начисто, без припуска (дефолт); xy = только стенки;
# all = стенки + полы/поверхности. Флаги: --allowance-xy / --allowance-all.
ROUGH_ALLOWANCE_MODE: "none"
ROUGH_STEPDOWN: 1.0    # мм — слой съёма за проход (главный рычаг времени обработки)
ROUGH_STEPOVER: 40     # % диаметра фрезы — шаг адаптивной строчки
ROUGH_TOLERANCE: 0.1   # мм — точность расчёта траектории (0.2 = быстрее, для черновой ок)

# ── Чистовая (по умолчанию ВЫКЛючена; включить: true или флаг --finish) ──────────
FINISH: false
SURFACE_CUT_PATTERN: "Offset"    # рисунок строчек: Offset / ZigZag / Line / Spiral / Circular
SURFACE_STEPOVER: 40             # % диаметра фрезы между строчками (чистовая: 10–25)
SURFACE_SAMPLE_INTERVAL: 0.5     # мм — разрешение сэмплинга (мельче = глаже, но дольше)

# ── Система координат ────────────────────────────────────────────────────────────
# corner-top = X0Y0 в углу детали, Z0 = верх (дефолт); center-top = X0Y0 в центре;
# model = не сдвигать (ноль = ноль CAD-файла).
ORIGIN: "corner-top"
# Авто-ориентация: положить деталь самой большой плоской гранью вниз (false = не вращать)
AUTO_ORIENT: true

# ── Siemens NX (мост .prt → STEP) ────────────────────────────────────────────────
# .prt подаётся на вход напрямую: если NX установлен, деталь (и заготовка .prt)
# конвертируются в STEP автоматически, headless (лицензия NX занимается на время).
NX_BASE_DIR: ""          # корень установки NX (папка с NXBIN); пусто → автопоиск
NX_STEP_AP: "242"        # версия STEP при экспорте из NX: 203 / 214 / 242
NX_TIMEOUT: 600          # сек — таймаут на конвертацию .prt → STEP

# ── Симуляция на виртуальном станке NX ISV (флаг --simulate) ─────────────────────
# Прогон G-Code через виртуальную стойку Sinumerik (CSE) со съёмом материала;
# результат — обработанная заготовка <gcode>_sim.stp. На время прогона
# открывается окно NX, но взаимодействия не требует (захват результата — через
# SaveAsPartfile, нужна лицензия ug_isv_full). Нужен установленный NX.
SIMULATE: false          # прогонять симуляцию после генерации G-Code
NX_SIM_MACHINE: "sim01_mill_3ax_sinumerik"  # станок из библиотеки NX (Sinumerik)
NX_SIM_TIMEOUT: 1800     # сек — таймаут на прогон симуляции

# ── Вывод и система ──────────────────────────────────────────────────────────────
POSTPROCESSOR: "grbl"    # диалект вашей стойки: grbl / linuxcnc / fanuc / mach3_mach4 …
FREECAD_CMD: ""          # путь к freecadcmd; пусто → автопоиск (AppImage/PATH/snap)
FREECAD_TIMEOUT: 3600    # сек — лимит на расчёт (черновая Adaptive считается долго)
# Только для мешей (.stl/.obj): множитель единиц → мм. Для STEP/IGES игнорируется.
STL_SCALE_TO_MM: 1000.0
