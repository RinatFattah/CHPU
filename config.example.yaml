# CAM: CAD-модель → G-Code — пример конфигурации
# Скопируйте в config.yaml и подставьте свои значения:
#   cp config.example.yaml config.yaml
#   python run_cam.py деталь.step --config config.yaml
# Полное описание параметров: README_CAM.md

# ── Инструмент и режимы резания (задать под свой станок/материал) ────────────────
TOOL_DIAMETER: 6.0     # мм — фреза, которая реально стоит в шпинделе
FEED_RATE: 800         # мм/мин — подача под ваш материал
SPINDLE_SPEED: 12000   # об/мин
SAFE_HEIGHT: 10.0      # мм — высота холостых перемещений над заготовкой

# ── Заготовка (габарит детали + поля; из файла не загружается) ───────────────────
# Размеры заготовки печатаются в лог и в шапку G-Code комментарием.
# Дефолт = 2 диаметра фрезы: контур выбирается адаптивно. Меньше — контур одним
# проходом вокруг силуэта; 0 = заготовка точно по габариту детали.
STOCK_MARGIN: 12.0     # мм — поля вокруг детали по X и Y
STOCK_MARGIN_TOP: 0.0  # мм — запас материала над деталью (Z+)
# Произвольная заготовка из файла (отливка/поковка): та же система координат,
# что у модели (экспорт из одной сборки NX); STOCK_MARGIN игнорируется.
STOCK_FILE: ""         # путь к .step/.iges/.brep/.stl; "" = бокс от габарита

# ── Черновая: по этапам, как у технолога ─────────────────────────────────────────
# Порядок: контур → отверстия по очереди → остальной объём. Зоны не пересекаются.
# ROUGH_MODE: "stages" (дефолт) | "layers" — ЭКСПЕРИМЕНТ: послойно, как Cavity
# Mill в NX (сечение заготовки − тень детали, диапазонами между уровнями).
ROUGH_ENABLED: true    # черновая вкл/выкл (выключить: false или --no-rough); НЕ зависит от припуска
ROUGH_MODE: "stages"
ROUGH_ALLOWANCE: 0.5   # мм — припуск под чистовую (шаг 0.1); 0 = черновая до номинала (без припуска)
ROUGH_STEPDOWN: 1.0    # мм — слой съёма за проход (главный рычаг времени обработки)
ROUGH_STEPOVER: 40     # % диаметра фрезы — шаг адаптивной строчки
ROUGH_TOLERANCE: 0.1   # мм — точность расчёта траектории (0.2 = быстрее, для черновой ок)

# ── Чистовая (по умолчанию включена; отключить: false или флаг --no-finish) ──────
FINISH: true
SURFACE_CUT_PATTERN: "Offset"    # рисунок строчек: Offset / ZigZag / Line / Spiral / Circular
SURFACE_STEPOVER: 40             # % диаметра фрезы между строчками (чистовая: 10–25)
SURFACE_SAMPLE_INTERVAL: 0.5     # мм — разрешение сэмплинга (мельче = глаже, но дольше)

# ── Мёртвые зоны (keep-out) — пока ТОЛЬКО с черновой (--no-finish) ───────────────
# Куда инструменту нельзя: прижимы, струбцины, границы стола. Координаты — в СК
# ПРОГРАММЫ (та же, что в шапке G-кода; снять с пробного прогона). Каждая зона
# автоматически раздувается на радиус фрезы + KEEPOUT_MARGIN; под запретным
# боксом тоже запрещено (фреза приходит сверху). Зоны из CLI (--keepout-box /
# --work-box / --keepout-halfspace) ДОБАВЛЯЮТСЯ к заданным здесь.
KEEPOUT_BOXES: []        # запретные боксы (не входить): [[x0,y0,z0, x1,y1,z1], ...]
WORK_BOXES: []           # рабочие боксы (не выходить; несколько = их пересечение)
KEEPOUT_HALFSPACES: []   # полупространства: [["Z","lt",5.0]] = запрещено ниже z=5
KEEPOUT_MARGIN: 0.5      # мм — страховочный зазор вокруг зон сверх радиуса фрезы

# ── Система координат ────────────────────────────────────────────────────────────
# corner-top = X0Y0 в углу детали, Z0 = верх (дефолт); center-top = X0Y0 в центре;
# model = не сдвигать (ноль = ноль CAD-файла).
ORIGIN: "corner-top"
# Авто-ориентация: положить деталь самой большой плоской гранью вниз (false = не вращать)
AUTO_ORIENT: true

# ── Вывод и система ──────────────────────────────────────────────────────────────
POSTPROCESSOR: "grbl"    # диалект вашей стойки: grbl / linuxcnc / fanuc / mach3_mach4 …
FREECAD_CMD: ""          # путь к freecadcmd; пусто → автопоиск (AppImage/PATH/snap)
FREECAD_TIMEOUT: 3600    # сек — лимит на расчёт (черновая Adaptive считается долго)
# Доп. экспорт для симуляции/верификации — обычно через флаги CLI, а не здесь:
#   --nx-export     → <out>_part.step / _stock.step        (сцена для NX ISV)
#   --verify-export → <out>_part.step / _reachable.step / _unreachable.step  (вход для verify.py)
# Только для мешей (.stl/.obj): множитель единиц → мм. Для STEP/IGES игнорируется.
STL_SCALE_TO_MM: 1000.0
